{% extends "library/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h3>{{ title }}</h3>
<form method="post">{% csrf_token %}
  {{ form|crispy }}
  <button class="btn btn-primary mt-2">Save</button>
  <a href="{% url 'library:book_list' %}" class="btn btn-secondary mt-2">Cancel</a>
</form>
{% endblock %}
