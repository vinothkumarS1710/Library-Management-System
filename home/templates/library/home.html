{% extends "library/base.html" %}
{% block content %}
<div class="row">
  <div class="col-md-4">
    <div class="card p-3 mb-3">
      <h5>Total books</h5>
      <h2>{{ total_books }}</h2>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card p-3 mb-3">
      <h5>Total members</h5>
      <h2>{{ total_members }}</h2>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card p-3 mb-3">
      <h5>Currently borrowed</h5>
      <h2>{{ borrowed }}</h2>
    </div>
  </div>
</div>
{% endblock %}
