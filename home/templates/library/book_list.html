{% extends "library/base.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h3>Books</h3>
  <a class="btn btn-success" href="{% url 'library:book_add' %}">Add Book</a>
</div>

<table class="table table-striped">
  <thead>
    <tr><th>Title</th><th>Author</th><th>ISBN</th><th>Available</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for book in books %}
    <tr>
      <td>{{ book.title }}</td>
      <td>{{ book.author }}</td>
      <td>{{ book.isbn }}</td>
      <td>{{ book.copies_available }}/{{ book.copies_total }}</td>
      <td>
        <a class="btn btn-sm btn-primary" href="{% url 'library:book_edit' book.pk %}">Edit</a>
        <a class="btn btn-sm btn-danger" href="{% url 'library:book_delete' book.pk %}">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="5">No books yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
